# Terskelverdier — verified against official sources, July 2026.
# Rules are DATA: a change in the law is a new entry with validity dates,
# never a code change. Amounts in NOK, excluding VAT.
#
# NOTE v1 scope: goods/services for state authorities (statlige myndigheter).
# Works (bygge- og anleggskontrakter) and non-state EØS thresholds: next batch.

