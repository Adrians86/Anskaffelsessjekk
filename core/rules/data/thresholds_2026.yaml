# ---------- FOSA (defence and security procurement) ----------
# NOTE: the 500k innslagspunkt does NOT apply to FOSA. Protocol duty from 100k.
# No national kunngjøringsplikt below the EØS thresholds. A new lov om forsvars-
# og sikkerhetsanskaffelser is in preparation (proposed innslagspunkt 300k) —
# when adopted, it becomes a new dated entry here.

- id: FOSA_PROTOKOLLPLIKT
  regime: FOSA
  valid_from: 2014-01-01
  valid_to: null
  when: {field: estimated_value, op: gte, value: 100000}
  consequence: PROTOKOLLPLIKT
  citation: "FOSA — protokollplikt for anskaffelser over 100 000 kr (vedlegg 3/4)"
  citation_url: "https://lovdata.no/forskrift/2013-10-04-1185"

- id: FOSA_UNDER_EOS_INGEN_KUNNGJORING
  regime: FOSA
